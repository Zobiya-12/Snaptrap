# ─────────────────────────────────────────────────────────────────────────────
# SNAPTRAP — Docker Compose (Full Stack)
#
# Architecture:
#   db          → PostgreSQL 15              (port 5432)
#   api         → Flask REST API             (port 5000)
#   honeypot    → Async honeypot engine      (ports 2222/8080/2121/3306)
#   node_server → server.js WebSocket +      (port 5001)
#                 ngrok tunnel → React :3000
#   frontend    → React (Nginx)              (port 3000)
#   prometheus  → Metrics collector          (port 9090 — internal only)
#   grafana     → Metrics dashboard          (port 3001)
#
# ── DAILY USE ────────────────────────────────────────────────────────────────
#   Check status:          docker compose ps
#   View logs:             docker compose logs -f
#   Rebuild after changes: docker compose up -d --build
#   Stop everything:       docker compose down
#   Stop + wipe volumes:   docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: snaptrap_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - snaptrap_net

  # ── Flask API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snaptrap_api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    entrypoint: ["./entrypoint.sh"]
    env_file:
      - .env
      - hashes.env
    environment:
      DB_HOST:             db
      DB_NAME:             ${DB_NAME}
      DB_USER:             ${DB_USER}
      DB_PASS:             ${DB_PASS}
      DB_PORT:             5432
      FLASK_SECRET:        ${FLASK_SECRET}
      FLASK_PORT:          5000
      ADMIN_NAME:          ${ADMIN_NAME}
      ADMIN_EMAIL:         ${ADMIN_EMAIL}
      ADMIN_ROLE:          ${ADMIN_ROLE}
      ADMIN_TOKEN:         ${ADMIN_TOKEN}
      DEMO_NAME:           ${DEMO_NAME}
      DEMO_EMAIL:          ${DEMO_EMAIL}
      DEMO_TOKEN:          ${DEMO_TOKEN}
      NGROK_HOST:          ${NGROK_HOST}
    volumes:
      - model_data:/app/models
      - app_data:/app/data
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - snaptrap_net

  # ── Honeypot Engine ─────────────────────────────────────────────────────────
  honeypot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snaptrap_honeypot
    restart: unless-stopped
    entrypoint: ["./entrypoint-honeypot.sh"]
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_PORT: 5432
    volumes:
      - model_data:/app/models
      - app_data:/app/data
    ports:
      - "2222:2222"   # fake SSH
      - "8080:8080"   # fake HTTP
      - "2121:2121"   # fake FTP
      - "3306:3306"   # fake MySQL
    depends_on:
      db:
        condition: service_healthy
    networks:
      - snaptrap_net

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    container_name: snaptrap_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - snaptrap_net

  # ── Node server.js — WebSocket + ngrok ─────────────────────────────────────
  node_server:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: snaptrap_node
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
      NGROK_DOMAIN:    ${NGROK_DOMAIN}
      WS_PORT:         5001
      REACT_PORT:      3000
    ports:
      - "5001:5001"
    depends_on:
      - api
    networks:
      - snaptrap_net

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: snaptrap_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    # No public port — Grafana reads it internally via snaptrap_net
    # Uncomment below only for local debugging:
    # ports:
    #   - "9090:9090"
    depends_on:
      - api
    networks:
      - snaptrap_net

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: snaptrap_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS}
      GF_SERVER_HTTP_PORT:        3001
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3001"
    depends_on:
      - prometheus
    networks:
      - snaptrap_net

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  db_data:
    name: snaptrap_db_data
  model_data:
    name: snaptrap_model_data
  app_data:
    name: snaptrap_app_data
  prometheus_data:
    name: snaptrap_prometheus_data
  grafana_data:
    name: snaptrap_grafana_data

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  snaptrap_net:
    name: snaptrap_net
    driver: bridge
